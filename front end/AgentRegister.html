<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Application | PharmaWave</title>
    <link rel="stylesheet" href="style1.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)),
                url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 120px 20px 60px 20px;
        }

        .form-box {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h2 {
            font-size: 32px;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .auth-header h3 {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .animated-gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: textGradient 3s linear infinite;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .agent-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
    </style>
</head>

<body>
    <header class="agent-header">
        <div class="logo">
            <a href="#" style="display: flex; align-items: center; gap: 8px; cursor: default; color: white;">
                <svg width="40" height="40" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(16,185,129,0.3));">
                    <defs>
                        <linearGradient id="pw-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#34d399" />
                        </linearGradient>
                    </defs>
                    <path d="M 25 85 L 25 25 A 20 20 0 0 1 25 65" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 60 45 L 80 85 L 100 45 L 120 85 L 145 15" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 115 15 L 145 15 L 145 45" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                PharmaWave Fleet
            </a>
        </div>
    </header>

    <div id="toast"></div>

    <div class="auth-page">
        <div class="form-box">
            <div class="auth-header">
                <h2>Join <span class="animated-gradient-text">Fleet</span></h2>
                <h3>Apply to be a delivery partner</h3>
            </div>

            <div class="input-box">
                <input type="text" id="username" class="input-field" placeholder="Username">
            </div>
            <div class="input-box">
                <input type="text" id="emailOrMobile" class="input-field" placeholder="Email">
            </div>
            <div class="input-box">
                <input type="password" id="password" class="input-field" placeholder="Password">
            </div>
            <div class="input-box">
                <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm Password">
            </div>

            <input type="submit" class="submit-btn" id="registerBtn" value="Submit Application">

            <div class="divider" style="text-align: center; margin: 20px 0; position: relative;">
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 1); padding: 0 10px; color: var(--text-muted); font-size: 14px;">OR</span>
            </div>

            <div id="g_id_onload"
                data-client_id="528351606474-fd3vem1np095i69ivpli62jefr5rfc61.apps.googleusercontent.com"
                data-context="signup" data-ux_mode="popup" data-callback="handleGoogleSignup" data-auto_prompt="false">
            </div>

            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signup_with" data-size="large" data-logo_alignment="left"
                style="display: flex; justify-content: center; margin-bottom: 20px; width: 100%;">
            </div>

            <div class="auth-links" style="text-align: center; margin-top: 20px;">
                <a href="AgentLogin.html" style="color: var(--text-muted); text-decoration: none;">Already a partner?
                    <strong style="color: var(--primary);">Login</strong></a>
            </div>
        </div>
    </div>

    <script>
        const toast = document.getElementById("toast");
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? 'http://localhost:3000' : '');

        function showToast(message, type = "success") {
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(() => { toast.className = toast.className.replace("show", "").trim(); }, 3000);
        }

        async function handleGoogleSignup(response) {
            const submitBtn = document.getElementById('registerBtn');
            submitBtn.value = 'Authorizing Google...';
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/google`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: response.credential, role: 'delivery' })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: data.userId,
                        username: data.username,
                        profile_pic: data.profile_pic,
                        role: data.role,
                        token: data.token
                    }));

                    showToast("Fleet Application Approved! Redirecting...", "success");
                    submitBtn.style.background = "var(--primary)";
                    submitBtn.value = 'Success!';

                    setTimeout(() => { window.location.href = "DeliveryDashboard.html"; }, 2000);
                } else {
                    showToast(data.message || "Google Authentication failed.", "error");
                    submitBtn.value = 'Submit Application';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showToast("Server connection error during Google Auth.", "error");
                submitBtn.value = 'Submit Application';
                submitBtn.disabled = false;
            }
        }

        (function () {
            const submitBtn = document.getElementById('registerBtn');

            submitBtn.addEventListener('click', async (e) => {
                e.preventDefault();

                const username = document.querySelector('#username').value.trim();
                const contact = document.querySelector('#emailOrMobile').value.trim();
                const password = document.querySelector('#password').value;
                const confirmPassword = document.querySelector('#confirmPassword').value;

                if (!username || !contact || !password) {
                    showToast('Please fill all fields!', "error");
                    return;
                }

                if (password !== confirmPassword) {
                    showToast('Passwords do not match!', "error");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.value = "Processing...";

                try {
                    const res = await fetch(`${API_BASE}/api/agent/register`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, contact, password })
                    });

                    const data = await res.json();

                    if (res.ok && data.success) {
                        localStorage.setItem('pharmaUser', JSON.stringify({
                            username: username,
                            role: 'delivery',
                            token: data.token
                        }));

                        showToast("Welcome to the Fleet! Redirecting...", "success");
                        submitBtn.style.background = "var(--primary)";
                        submitBtn.value = "Success!";
                        setTimeout(() => window.location.href = "DeliveryDashboard.html", 2500);
                    } else {
                        showToast(data.message || "Registration failed", "error");
                        submitBtn.disabled = false;
                        submitBtn.value = "Submit Application";
                    }
                } catch (err) {
                    showToast("Server connection error: Is the backend running?", "error");
                    console.error(err);
                    submitBtn.disabled = false;
                    submitBtn.value = "Submit Application";
                }
            });
        })();
    </script>
</body>

</html>
