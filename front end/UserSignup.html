<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Pharma Wave</title>
    <link rel="stylesheet" href="style1.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="config.js"></script>
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 8px;">
                <svg width="40" height="40" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(16,185,129,0.3));">
                    <defs>
                        <linearGradient id="pw-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#34d399" />
                        </linearGradient>
                    </defs>
                    <path d="M 25 85 L 25 25 A 20 20 0 0 1 25 65" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 60 45 L 80 85 L 100 45 L 120 85 L 145 15" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 115 15 L 145 15 L 145 45" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                PharmaWave
            </a>
        </div>
        <div class="navigation">
            <ul>
                <li><a href="index.html#catalog">Medicines</a></li>
                <li><a href="#">Locations</a></li>
                <li><a href="#">24/7 Support</a></li>
                <li><a href="DirectLogin.html" class="nav-btn login" id="authBtn">Login</a></li>
            </ul>
        </div>
    </header>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <div class="auth-page" style="padding-top: 120px; padding-bottom: 60px;">
        <div class="form-box">
            <div class="auth-header">
                <h2>Create <span class="animated-gradient-text">Account</span></h2>
                <h3>Join Pharma Wave for exclusive benefits</h3>
            </div>

            <div class="input-box">
                <input type="text" id="username" class="input-field" placeholder="Username">
            </div>
            <div class="input-box">
                <input type="email" id="emailOrMobile" class="input-field" placeholder="Email (Google verified)">
            </div>
            <div class="input-box" style="position: relative;">
                <input type="password" id="password" class="input-field" placeholder="Password" style="padding-right: 50px;" oninput="checkPasswordRules(this.value)">
                <button type="button" onclick="togglePwd('password','eyeIcon1')" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:20px;display:flex;align-items:center;padding:0;">
                    <ion-icon id="eyeIcon1" name="eye-outline"></ion-icon>
                </button>
            </div>

            <!-- Password Rules -->
            <div id="pwdRules" style="background:rgba(0,0,0,0.04); border-radius:12px; padding:12px 16px; margin-top:-10px; margin-bottom:10px; font-size:13px; display:none;">
                <p style="margin:0 0 6px; font-weight:700; color:#334155; font-size:12px;">PASSWORD REQUIREMENTS</p>
                <div id="rule-capital" style="display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#94a3b8;"><ion-icon name="close-circle"></ion-icon> First letter must be uppercase</div>
                <div id="rule-number" style="display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#94a3b8;"><ion-icon name="close-circle"></ion-icon> Must contain a number (0–9)</div>
                <div id="rule-special" style="display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#94a3b8;"><ion-icon name="close-circle"></ion-icon> Must contain a special character (!@#$...)</div>
                <div id="rule-length" style="display:flex;align-items:center;gap:8px;color:#94a3b8;"><ion-icon name="close-circle"></ion-icon> Minimum 8 characters</div>
            </div>

            <div class="input-box" style="position: relative;">
                <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm Password" style="padding-right: 50px;">
                <button type="button" onclick="togglePwd('confirmPassword','eyeIcon2')" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:20px;display:flex;align-items:center;padding:0;">
                    <ion-icon id="eyeIcon2" name="eye-outline"></ion-icon>
                </button>
            </div>

            <input type="submit" class="submit-btn" value="Create Account">

            <div class="Two-col">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="register-check" style="width:16px; height:16px; border-radius: 4px;">
                    <label for="register-check" style="cursor: pointer;">Remember Me</label>
                </div>
                <div><a href="#" style="color: var(--primary); text-decoration: none; font-weight: 700;">Terms &
                        Conditions</a></div>
            </div>
        </div>
    </div>

    <!-- Signup Script -->
    <script>
        // Setup Toast System
        const toast = document.getElementById("toast");
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? 'http://localhost:3000' : '');

        function showToast(message, type = "success") {
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(() => { toast.className = toast.className.replace("show", "").trim(); }, 3000);
        }

        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.setAttribute('name', input.type === 'password' ? 'eye-outline' : 'eye-off-outline');
        }

        function setRule(id, pass) {
            const el = document.getElementById(id);
            el.style.color = pass ? '#10b981' : '#94a3b8';
            el.querySelector('ion-icon').setAttribute('name', pass ? 'checkmark-circle' : 'close-circle');
        }

        function checkPasswordRules(val) {
            const rules = document.getElementById('pwdRules');
            rules.style.display = val.length > 0 ? 'block' : 'none';
            setRule('rule-capital', /^[A-Z]/.test(val));
            setRule('rule-number', /[0-9]/.test(val));
            setRule('rule-special', /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(val));
            setRule('rule-length', val.length >= 8);
        }

        function validatePassword(password) {
            if (!/^[A-Z]/.test(password)) { showToast('Password must start with a capital letter', 'error'); return false; }
            if (!/[0-9]/.test(password)) { showToast('Password must contain at least one number', 'error'); return false; }
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password)) { showToast('Password must contain a special character (!@#$...)', 'error'); return false; }
            if (password.length < 8) { showToast('Password must be at least 8 characters', 'error'); return false; }
            return true;
        }

        (function () {
            const submitBtn = document.querySelector('.submit-btn');

            submitBtn.addEventListener('click', async (e) => {
                e.preventDefault();

                const username = document.querySelector('#username').value.trim();
                const contact = document.querySelector('#emailOrMobile').value.trim();
                const password = document.querySelector('#password').value;
                const confirmPassword = document.querySelector('#confirmPassword').value;

                if (!username || !contact || !password) {
                    showToast('Please fill all fields!', "error");
                    return;
                }

                // Password rules validation
                if (!validatePassword(password)) return;

                // Only allow verified/professional email addresses
                // Reject random emails like "xyz@gmail.com" or "blaa@blaa"
                const emailRegex = /^[a-zA-Z0-9._-]+@(gmail\.com|googlemail\.com|yahoo\.com|outlook\.com|hotmail\.com|pharmawave\.com|citymedical\.com)$/i;
                const minEmailLength = 6; // Minimum username length before @
                
                const emailParts = contact.split('@');
                if (!emailRegex.test(contact) || emailParts[0].length < minEmailLength) {
                    showToast('Please enter a valid email address (gmail, yahoo, outlook, or registered domain)', "error");
                    return;
                }

                if (password !== confirmPassword) {
                    showToast('Passwords do not match!', "error");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.value = "Creating account...";

                try {
                    // Register in backend database (works for both email and mobile)
                    const res = await fetch(`${API_BASE}/register`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, contact, password })
                    });
                    const data = await res.json();

                    if (res.ok && data.success) {
                        // Account created successfully
                        localStorage.setItem('pharmaUser', JSON.stringify({
                            userId: data.userId,
                            username: username,
                            email: contact,
                            role: 'user',
                            token: data.token
                        }));
                        showToast("Welcome! Account created successfully!", "success");
                        submitBtn.style.background = "var(--primary)";
                        submitBtn.value = "Success!";
                        setTimeout(() => window.location.href = "index.html", 2500);
                    } else {
                        showToast(data.message || "Registration failed", "error");
                        submitBtn.disabled = false;
                        submitBtn.value = "Create Account";
                    }

                } catch (err) {
                    let msg = "Registration failed.";
                    if (err.code === "auth/email-already-in-use") msg = "This email is already registered. Try logging in!";
                    else if (err.code === "auth/weak-password") msg = "Password must be at least 6 characters.";
                    else if (err.code === "auth/invalid-email") msg = "Please enter a valid email address.";
                    showToast(msg, "error");
                    submitBtn.disabled = false;
                    submitBtn.value = "Create Account";
                }
            });
        })();
    </script>
</body>

</html>
