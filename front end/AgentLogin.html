<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Portal | PharmaWave</title>
    <!-- Reusing main stylesheet to perfectly match consumer login -->
    <link rel="stylesheet" href="style1.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="config.js"></script>
    <style>
        /* Exact layout logic utilized from DirectLogin.html */
        .auth-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)),
                url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .form-box {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h2 {
            font-size: 32px;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .auth-header h3 {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .animated-gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: textGradient 3s linear infinite;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        /* Simplified Header logic */
        .agent-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 12px;
        }

        .login-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-tab.active {
            background: rgba(30, 41, 59, 0.9);
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .biometric-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .biometric-btn:hover {
            background: rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body>
    <!-- STRIPPED HEADER: No Customer Nav Links -->
    <header class="agent-header">
        <div class="logo">
            <a href="#" style="display: flex; align-items: center; gap: 8px; cursor: default; color: white;">
                <svg width="40" height="40" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(16,185,129,0.3));">
                    <defs>
                        <linearGradient id="pw-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#34d399" />
                        </linearGradient>
                    </defs>
                    <path d="M 25 85 L 25 25 A 20 20 0 0 1 25 65" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 60 45 L 80 85 L 100 45 L 120 85 L 145 15" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 115 15 L 145 15 L 145 45" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                PharmaWave Fleet
            </a>
        </div>
    </header>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <div class="auth-page">
        <div class="form-box">
            <div class="auth-header">
                <h2>Agent <span class="animated-gradient-text">Portal</span></h2>
                <h3>Secure dispatch login</h3>
            </div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginMode('password')">Password</div>
                <div class="login-tab" onclick="switchLoginMode('otp')">OTP Login</div>
            </div>

            <div id="passwordSection">
                <div class="input-box">
                    <input type="text" id="username" class="input-field" placeholder="Agent ID / Email / Mobile">
                </div>
                <div class="input-box">
                    <input type="password" id="password" class="input-field" placeholder="Password">
                </div>
                <button class="submit-btn" id="loginBtn">Authorize Session</button>
            </div>

            <div id="otpSection" style="display: none;">
                <div class="input-box">
                    <input type="text" id="otpMobile" class="input-field" placeholder="Enter Mobile Number">
                </div>
                <div class="input-box" id="otpCodeContainer" style="display: none;">
                    <input type="text" id="otpCode" class="input-field" placeholder="Enter 6-digit OTP" style="letter-spacing: 5px; font-weight: bold; text-align: center;">
                </div>
                <button class="submit-btn" id="sendOtpBtn" onclick="handleOtpFlow()">Send OTP</button>
            </div>

            <button class="biometric-btn" onclick="handleBiometricLogin()">
                <ion-icon name="finger-print" style="font-size: 24px;"></ion-icon> Authenticate Biometrically
            </button>

            <div class="auth-links" style="text-align: center; margin-top: 20px;">
                <a href="ForgotLogin.html"
                    style="display: block; margin-bottom: 10px; color: var(--text-muted); text-decoration: none;">Forgot
                    password?</a>
                <a href="AgentRegister.html"
                    style="display: block; color: var(--text-muted); text-decoration: none;">Don't have an agent
                    account? <strong style="color: var(--primary);">Apply here</strong></a>
            </div>

            <!-- Back to consumer login link -->
            <div style="text-align: center; margin-top: 25px;">
                <a href="DirectLogin.html"
                    style="font-size: 13px; color: var(--text-muted); text-decoration: none; font-weight: 600;">
                    <ion-icon name="arrow-back-outline"></ion-icon> Return to Customer Login
                </a>
            </div>
        </div>
    </div>

    <!-- Agent Login Script -->
    <script>
        const toast = document.getElementById("toast");
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? 'http://localhost:3000' : '');

        function showToast(message, type = "success") {
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(() => { toast.className = toast.className.replace("show", "").trim(); }, 3000);
        }

        const loginBtn = document.getElementById("loginBtn");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");

        function switchLoginMode(mode) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            if(mode === 'password') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('passwordSection').style.display = 'block';
                document.getElementById('otpSection').style.display = 'none';
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('passwordSection').style.display = 'none';
                document.getElementById('otpSection').style.display = 'block';
            }
        }

        function handleBiometricLogin() {
            const trustedAgent = localStorage.getItem('pharmaAgentTrusted');
            if (!trustedAgent) {
                showToast("Biometric access not configured. Please sign in with password first to enable.", "error");
                return;
            }
            
            showToast("Authenticating with Face ID / Fingerprint...", "success");
            setTimeout(() => {
                // If they were already trusted, we restore their session info if possible, 
                // or just allow entry if we trust the device (mock logic for demo)
                const savedUser = JSON.parse(localStorage.getItem('pharmaUser') || '{}');
                if (savedUser.role === 'delivery') {
                    window.location.href = 'DeliveryDashboard.html';
                } else {
                    // If no valid user session, but trusted device, we mock a session for the trusted agent
                    localStorage.setItem('pharmaUser', JSON.stringify({ userId: 99, username: 'Trusted Agent', role: 'delivery', token: 'mock-trusted-token' }));
                    window.location.href = 'DeliveryDashboard.html';
                }
            }, 1500);
        }

        let otpSent = false;
        function handleOtpFlow() {
            const btn = document.getElementById('sendOtpBtn');
            const mobile = document.getElementById('otpMobile').value.trim();
            if(!otpSent) {
                if(!mobile) return showToast("Enter mobile number", "error");
                btn.textContent = 'Sending...';
                setTimeout(() => {
                    showToast("OTP Sent to " + mobile, "success");
                    document.getElementById('otpCodeContainer').style.display = 'block';
                    btn.textContent = 'Verify OTP & Login';
                    otpSent = true;
                }, 1000);
            } else {
                const code = document.getElementById('otpCode').value.trim();
                if(!code || code.length < 4) return showToast("Enter valid OTP", "error");
                btn.textContent = 'Verifying...';
                setTimeout(() => {
                    showToast("OTP Verified. Deploying Dashboard...", "success");
                    // Mock storing agent login state
                    localStorage.setItem('pharmaAgent', JSON.stringify({ userId: 99, role: 'delivery' }));
                    window.location.href = "DeliveryDashboard.html";
                }, 1500);
            }
        }

        const handleEnterKey = (e) => {
            if (e.key === 'Enter') loginBtn.click();
        };
        usernameInput.addEventListener('keypress', handleEnterKey);
        passwordInput.addEventListener('keypress', handleEnterKey);

        loginBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showToast("Credentials required", "error");
                return;
            }

            loginBtn.textContent = 'Authorizing...';
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/agent/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: data.userId,
                        username: data.username,
                        profile_pic: data.profile_pic,
                        role: data.role,
                        token: data.token
                    }));

                    localStorage.setItem('pharmaAgentTrusted', 'true');
                    showToast("Access Granted. Deploying Dashboard...", "success");
                    loginBtn.textContent = 'Success';
                    loginBtn.style.background = "var(--primary)";

                    // Redirect exclusively to dashboard
                    setTimeout(() => window.location.href = "DeliveryDashboard.html", 2000);
                } else {
                    showToast(data.message || "Invalid credentials", "error");
                    loginBtn.textContent = 'Authorize Session';
                    loginBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                // Fallback for visual mock if backend is down
                showToast("Fleet Server Offline. Proceeding with Local Demo Session...", "success");
                localStorage.setItem('pharmaAgentTrusted', 'true');
                localStorage.setItem('pharmaUser', JSON.stringify({ userId: 99, role: 'delivery' }));
                setTimeout(() => window.location.href = "DeliveryDashboard.html", 2000);
            }
        });
    </script>
</body>

</html>
