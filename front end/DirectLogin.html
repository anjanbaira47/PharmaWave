<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pharma Wave</title>
    <link rel="stylesheet" href="style1.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="config.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxFspLccHlPDbmMCgZkI5VQPEg0IK4xfk",
            authDomain: "pro-pharma-wave.firebaseapp.com",
            projectId: "pro-pharma-wave",
            storageBucket: "pro-pharma-wave.firebasestorage.app",
            messagingSenderId: "528351606474",
            appId: "1:528351606474:web:e6cde01d2545aa7b236633"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(() => { toast.className = toast.className.replace("show", "").trim(); }, 3000);
        }

        window.handleFirebaseGoogleLogin = async function () {
            let userData = null;
            try {
                const result = await signInWithPopup(auth, provider);
                userData = result.user;

                // Send the verified profile to backend
                const exchangeRes = await fetch(`${API_BASE}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userData.email,
                        name: userData.displayName,
                        picture: userData.photoURL
                    })
                });

                const authData = await exchangeRes.json();

                if (authData.success) {
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: authData.userId,
                        username: authData.username,
                        profile_pic: authData.profile_pic,
                        role: authData.role,
                        token: authData.token
                    }));
                    showToast("Google Login Successful!", "success");
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                } else {
                    showToast(authData.message || "Login failed", "error");
                }

            } catch (err) {
                console.error("Login process error:", err);
                
                // CLIENT-SIDE FALLBACK FOR GOOGLE LOGIN (If server is down)
                if (userData && userData.email) {
                    showToast("Server unreachable. Entering Offline Demo Mode...", "success");
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: 1,
                        username: userData.displayName || userData.email.split('@')[0],
                        profile_pic: userData.photoURL,
                        role: 'user',
                        token: 'offline-google-demo-token'
                    }));
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                    return;
                }

                showToast("Sign-In failed: " + (err.message || "Unknown error"), "error");
            }
        };
    </script>
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 8px;">
                <svg width="40" height="40" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(16,185,129,0.3));">
                    <defs>
                        <linearGradient id="pw-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#34d399" />
                        </linearGradient>
                    </defs>
                    <path d="M 25 85 L 25 25 A 20 20 0 0 1 25 65" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 60 45 L 80 85 L 100 45 L 120 85 L 145 15" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M 115 15 L 145 15 L 145 45" stroke="url(#pw-gradient)" stroke-width="16"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                PharmaWave
            </a>
        </div>
        <div class="navigation">
            <ul>
                <li><a href="index.html#catalog">Medicines</a></li>
                <li><a href="#">Locations</a></li>
                <li><a href="#">24/7 Support</a></li>
                <li><a href="DirectLogin.html" class="nav-btn login" id="authBtn">Login</a></li>
            </ul>
        </div>
    </header>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <div class="auth-page">
        <div class="form-box">
            <div class="auth-header">
                <h2>Welcome <span class="animated-gradient-text">Back</span></h2>
                <h3>Login to your account to continue</h3>
            </div>

            <div class="input-box">
                <input type="text" id="emailInput" class="input-field" placeholder="Email or Username">
            </div>
            <div class="input-box" style="position: relative;">
                <input type="password" id="password" class="input-field" placeholder="Password" style="padding-right: 50px;">
                <button type="button" id="togglePwd" onclick="togglePassword('password','togglePwdIcon')"
                    style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#64748b; font-size:20px; display:flex; align-items:center; padding:0;">
                    <ion-icon id="togglePwdIcon" name="eye-outline"></ion-icon>
                </button>
            </div>

            <button class="submit-btn" id="loginBtn">Login securely</button>


            <button onclick="handleFirebaseGoogleLogin()" style="margin-top: 20px; width:100%; padding:14px; background:white; border:1px solid #dadce0; border-radius:12px; display:flex; align-items:center; justify-content:center; gap:12px; font-size:15px; font-weight:600; color:#3c4043; cursor:pointer; transition:box-shadow 0.2s;" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'" onmouseout="this.style.boxShadow='none'">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20">
                Sign in with Google
            </button>

            <div class="auth-links">
                <a href="ForgotPassword.html">Forgot Password?</a>
                <a href="UserSignup.html">Don't have an account? <strong>Sign up here</strong></a>
            </div>

            <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px dashed rgba(0,0,0,0.1);">
                <p style="margin: 0; color: #64748b; font-size: 14px; font-weight: 600;">
                    Are you a delivery agent? 
                    <a href="AgentLogin.html" style="color: #f59e0b; text-decoration: underline; margin-left: 5px;">Agent Login</a>
                </p>
            </div>


        </div>
    </div>

    <!-- Login Script -->
    <script>
        const toast = document.getElementById("toast");
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE : (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? 'http://localhost:3000' : '');

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('name', 'eye-off-outline');
            } else {
                input.type = 'password';
                icon.setAttribute('name', 'eye-outline');
            }
        }


        function showToast(message, type = "success") {
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(() => { toast.className = toast.className.replace("show", "").trim(); }, 3000);
        }


        const loginBtn = document.getElementById("loginBtn");
        const emailInput = document.getElementById("emailInput");
        const passwordInput = document.getElementById("password");

        // Allow pressing Enter to login
        const handleEnterKey = (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        };
        emailInput.addEventListener('keypress', handleEnterKey);
        passwordInput.addEventListener('keypress', handleEnterKey);

        loginBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showToast("Please enter both email and password", "error");
                return;
            }

            // Validation: Accept email, mobile, or username
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const mobileRegex = /^[6-9]\d{9}$/;
            const isValidEmail = emailRegex.test(email);
            const isValidMobile = mobileRegex.test(email);
            const isUsername = email.length > 0 && email.trim(); // Username must not be empty

            if (!isValidEmail && !isValidMobile && !isUsername) {
                showToast("Please enter a valid email, mobile number, or username.", "error");
                return;
            }

            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;

            // Shared offline demo fallback — runs on BOTH server errors AND network failures
            function tryOfflineFallback(reason) {
                if (email === 'admin@pharmawave.com' && password === 'admin123') {
                    showToast("Server unreachable. Entering Offline Admin Mode...", "success");
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: 999, username: 'Admin (Offline)', role: 'admin', token: 'offline-demo-token'
                    }));
                    loginBtn.textContent = 'Success!';
                    setTimeout(() => { window.location.href = "AdminDashboard.html"; }, 2000);
                    return true;
                }
                if (email === 'agent@pharmawave.com' && password === 'agent123') {
                    showToast("Server unreachable. Entering Offline Agent Mode...", "success");
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: 19, username: 'agent1 (Offline)', role: 'delivery', token: 'offline-demo-token'
                    }));
                    loginBtn.textContent = 'Success!';
                    setTimeout(() => { window.location.href = "DeliveryDashboard.html"; }, 2000);
                    return true;
                }
                if ((email === 'anjanbaira@gmail.com' || email === 'user@gmail.com') && (password === 'test123' || password === 'user123')) {
                    showToast("Server unreachable. Entering Offline User Mode...", "success");
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: 1, username: 'Anjan (Offline)', role: 'user', token: 'offline-demo-token'
                    }));
                    loginBtn.textContent = 'Success!';
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                    return true;
                }
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save user info and JWT token in localStorage for the cart and header
                    localStorage.setItem('pharmaUser', JSON.stringify({
                        userId: data.userId,
                        username: data.username,
                        profile_pic: data.profile_pic,
                        role: data.role,
                        token: data.token
                    }));

                    showToast("Login Successful! Redirecting...", "success");
                    loginBtn.style.background = "var(--primary)";
                    loginBtn.textContent = 'Success!';

                    setTimeout(() => {
                        let destination = "index.html";
                        if (data.role === 'admin') destination = "AdminDashboard.html";
                        else if (data.role === 'delivery') destination = "DeliveryDashboard.html";
                        else if (data.role === 'pharmacy') destination = "PharmacyDashboard.html";
                        window.location.href = destination;
                    }, 2000);
                } else {
                    // Server responded but with an error (4xx/5xx) — try demo fallback first
                    if (!tryOfflineFallback('server_error')) {
                        showToast(data.message || "Invalid credentials. Please try again.", "error");
                        loginBtn.textContent = 'Login securely';
                        loginBtn.disabled = false;
                    }
                }
            } catch (err) {
                console.error(err);
                // Network/timeout error — try demo fallback
                if (!tryOfflineFallback('network_error')) {
                    showToast("Server connection error. Please try again later.", "error");
                    loginBtn.textContent = 'Login securely';
                    loginBtn.disabled = false;
                }
            }
        });
    </script>
</body>

</html>
